name: DevSecOps Pro Pipeline

on:
  push:
    branches: ["main"]

jobs:

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks (no history)
        run: |
            docker run --rm -v ${{ github.workspace }}:/path \
            zricethezav/gitleaks detect \
            --source="/path" \
            --no-git

  sast:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - run: pip install semgrep
      - run: semgrep --config=p/python --error src/

  dependency:
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4
      - name: Create virtual environment
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pip-audit
      - name: Run dependency audit
        run: |
          . .venv/bin/activate
          pip-audit --fix

  container:
    runs-on: ubuntu-latest
    needs: dependency
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t demo .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: demo
          exit-code: "0"