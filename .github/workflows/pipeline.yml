name: DevSecOps Pro Pipeline

on:
  push:
    branches: ["main"]

jobs:

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  sast:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - run: pip install semgrep
      - run: semgrep --config=p/python --error src/

  dependency:
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt pip-audit
      - run: pip-audit

  container:
    runs-on: ubuntu-latest
    needs: dependency
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t demo .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: demo
          exit-code: "1"